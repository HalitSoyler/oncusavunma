<header class="site-header fixed top-0 left-0 right-0 z-50 text-white" style="background:linear-gradient(180deg,#060E1F 0%,#0B2341 100%);box-shadow:0 1px 0 rgba(80,130,200,0.12),0 4px 24px rgba(2,8,16,0.7);">
  <style>
    /* ── Dropdown ── */
    .nav-dropdown { position: relative; }
    .nav-dropdown .nav-dropdown-panel {
      position: absolute; top: 100%; left: 0;
      min-width: 250px; padding-top: 0;
      opacity: 0; visibility: hidden;
      transform: translateY(-8px);
      transition: opacity 0.2s ease, transform 0.22s ease, visibility 0.2s;
    }
    .nav-dropdown:hover .nav-dropdown-panel,
    .nav-dropdown[aria-expanded="true"] .nav-dropdown-panel {
      opacity: 1; visibility: visible; transform: translateY(0);
    }
    .nav-dropdown-panel-inner {
      background: linear-gradient(160deg, #0D1E38 0%, #060E1F 100%);
      border-top: 2px solid #C8102E;
      border: 1px solid rgba(80,130,200,0.14);
      border-top: 2px solid #C8102E;
      box-shadow: 0 16px 40px rgba(2,8,16,0.75), 0 4px 12px rgba(2,8,16,0.5);
      padding: 0.4rem 0;
    }
    .nav-dropdown-panel a {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.72rem 1.35rem;
      font-size: 0.71rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: rgba(180,210,255,0.65); text-decoration: none;
      transition: background 0.18s, color 0.18s, padding-left 0.18s;
      border-left: 2px solid transparent;
    }
    .nav-dropdown-panel a::before {
      content: '';
      width: 4px; height: 4px;
      background: #C8102E;
      flex-shrink: 0; opacity: 0;
      transition: opacity 0.18s;
    }
    .nav-dropdown-panel a:hover {
      background: rgba(200,16,46,0.08);
      color: #E8F0FF;
      padding-left: 1.6rem;
      border-left-color: #C8102E;
    }
    .nav-dropdown-panel a:hover::before { opacity: 1; }

    /* ── Nav items ── */
    .header-nav-item {
      position: relative;
      display: flex; align-items: center;
      padding: 0 1.1rem; height: 4.5rem;
      font-size: 0.71rem; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(180,210,255,0.62); text-decoration: none;
      cursor: pointer; white-space: nowrap;
      transition: color 0.2s ease;
    }
    .header-nav-item::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, #C8102E, #A00E25);
      transform: scaleX(0);
      transition: transform 0.22s ease;
    }
    .header-nav-item:hover,
    .header-nav-item.active { color: #E8F0FF; }
    .header-nav-item:hover::after,
    .header-nav-item.active::after { transform: scaleX(1); }

    /* ── CTA button — accent teal on header ── */
    .header-cta {
      display: flex; align-items: center;
      padding: 0 1.5rem; height: 2.8rem;
      font-size: 0.69rem; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      background: #C8102E; color: #fff;
      text-decoration: none; flex-shrink: 0;
      margin-left: 1.5rem;
      box-shadow: 0 4px 14px rgba(200,16,46,0.3);
      transition: background 0.2s ease, box-shadow 0.2s ease;
    }
    .header-cta:hover {
      background: #A00E25;
      box-shadow: 0 6px 20px rgba(200,16,46,0.45);
    }

    /* ── Logo divider ── */
    .header-logo-divider {
      width: 1px; height: 2rem;
      background: rgba(80,130,200,0.2);
      margin: 0 1.25rem 0 1.5rem; flex-shrink: 0;
    }

    /* ── Accent line beneath header ── */
    .header-accent-line {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(80,130,200,0.2) 20%,
        rgba(80,130,200,0.35) 50%,
        rgba(80,130,200,0.2) 80%,
        transparent 100%);
    }
  </style>

      style="border:1px solid rgba(80,130,200,0.2);"
      aria-label="Menüyü aç"

    >
      <div class="mobile-nav-toggle-icon"><span></span><span></span><span></span></div>
    </button>

      <a href="kurumsal.html"     class="nav-link py-3.5 border-b text-[0.72rem] tracking-[0.12em]" style="color:rgba(180,210,255,0.65);border-color:rgba(80,130,200,0.1);">Kurumsal</a>
      <div style="border-bottom:1px solid rgba(80,130,200,0.1);">
        <span class="block py-3.5 font-semibold text-[0.72rem] uppercase tracking-[0.12em]" style="color:rgba(180,210,255,0.65);">Üretim</span>
        <a href="uretim-askeri-kablaj.html" class="nav-link flex items-center gap-2 py-2.5 pl-4 text-[0.7rem] tracking-[0.1em] mb-1 border-l-2" style="color:rgba(130,170,230,0.55);border-left-color:rgba(200,16,46,0.45);">Askeri Kablaj Üretimi</a>
        <a href="uretim-sivil-kablaj.html"  class="nav-link flex items-center gap-2 py-2.5 pl-4 text-[0.7rem] tracking-[0.1em] mb-3 border-l-2" style="color:rgba(130,170,230,0.55);border-left-color:rgba(200,16,46,0.45);">Sivil Kablaj Üretimi</a>
      </div>
      <a href="tasarim.html"      class="nav-link py-3.5 border-b text-[0.72rem] tracking-[0.12em]" style="color:rgba(180,210,255,0.65);border-color:rgba(80,130,200,0.1);">Tasarım</a>
      <a href="test.html"         class="nav-link py-3.5 border-b text-[0.72rem] tracking-[0.12em]" style="color:rgba(180,210,255,0.65);border-color:rgba(80,130,200,0.1);">Test</a>
      <a href="projelerimiz.html" class="nav-link py-3.5 border-b text-[0.72rem] tracking-[0.12em]" style="color:rgba(180,210,255,0.65);border-color:rgba(80,130,200,0.1);">Projelerimiz</a>
      <a href="sertifikalar.html" class="nav-link py-3.5 border-b text-[0.72rem] tracking-[0.12em]" style="color:rgba(180,210,255,0.65);border-color:rgba(80,130,200,0.1);">Sertifikalarımız</a>
